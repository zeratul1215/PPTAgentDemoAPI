services:
  - type: web
    name: pptagent-api
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      # Secrets (set in Render dashboard)
      - key: GEMINI_API_KEY
        sync: false
      - key: PPTAGENT_API_TOKEN
        sync: false

      # Persistent storage (mounted disk)
      - key: PPTAGENT_DATA_DIR
        value: /app/result

      # Limits
      - key: PPTAGENT_MAX_CONCURRENT_JOBS
        value: "1"
      - key: PPTAGENT_MAX_UPLOAD_MB
        value: "50"

      # Default mode: Gemma for text translation + image descriptions, Gemini for the rest
      - key: PPTAGENT_DEFAULT_PIPELINE_MODE
        value: mixed_models
      - key: PPTAGENT_DEFAULT_MODEL_TRANSLATE
        value: gemma-4-31b-it
      - key: PPTAGENT_DEFAULT_MODEL_IMAGE_DESC
        value: gemma-4-31b-it
      - key: PPTAGENT_DEFAULT_MODEL_REST
        value: gemini-3.1-flash-lite
      - key: PPTAGENT_DEFAULT_THINKING_BUDGET_REST
        value: "0"

    disk:
      name: pptagent-data
      mountPath: /app/result
      sizeGB: 10

